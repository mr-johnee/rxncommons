version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: rxncommons-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER:-rxn_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rxn_pass_123}
      - POSTGRES_DB=${DB_NAME:-rxncommons}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 挂载初始化脚本，启动时自动创建扩展
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: rxncommons-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-rxn_redis_123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: rxncommons-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minio_pass_123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台 Web UI 端口
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data: